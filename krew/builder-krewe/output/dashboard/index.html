<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krewe Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .vline { width:2px; height:20px; background:#374151; margin:0 auto; }
        .hline-wrap { display:flex; align-items:center; justify-content:center; gap:0; }
        .hline { height:2px; background:#374151; flex:1; }
        .node-col { display:flex; flex-direction:column; align-items:center; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 font-sans antialiased">

    <header class="bg-gray-900 border-b border-gray-800 sticky top-0 z-10">
        <div class="max-w-5xl mx-auto py-4 px-6 flex justify-between items-center">
            <h1 class="text-xl font-bold text-white tracking-tight">Krewe Dashboard</h1>
            <div class="flex items-center gap-4">
                <span id="last-updated" class="text-sm text-gray-400"></span>
                <button onclick="fetchAll()" class="px-4 py-1.5 text-sm bg-indigo-600 hover:bg-indigo-500 text-white rounded transition">
                    Refresh
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto p-6 space-y-8">

        <!-- Hive Topology -->
        <section class="bg-gray-900 border border-gray-800 rounded-xl p-6">
            <h2 class="text-lg font-semibold text-gray-200 mb-6">Hive Nodes</h2>
            <div id="hive-topology">
                <p class="text-gray-500 text-sm text-center">Loading...</p>
            </div>
        </section>

        <!-- Docker Containers -->
        <section class="bg-gray-900 border border-gray-800 rounded-xl p-6">
            <h2 class="text-lg font-semibold text-gray-200 mb-4">Containers</h2>
            <div id="docker-list" class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <p class="text-gray-500 text-sm">Loading...</p>
            </div>
        </section>

        <!-- GPU -->
        <section class="bg-gray-900 border border-gray-800 rounded-xl p-6">
            <h2 class="text-lg font-semibold text-gray-200 mb-4">GPU (K11)</h2>
            <div id="gpu-info" class="text-sm text-gray-400">Loading...</div>
        </section>

    </main>

    <script>
        async function fetchAll() {
            await Promise.all([fetchHiveNodes(), fetchContainers(), fetchGpu()]);
            document.getElementById('last-updated').innerText = new Date().toLocaleTimeString();
        }

        function nodeCard(n, extraClass = '') {
            const dotColor   = n.reachable ? '#4ade80' : '#4b5563';
            const labelColor = n.reachable ? '#4ade80' : '#4b5563';
            const borderColor = n.self ? '#4f46e5' : '#374151';
            const osIcon = { linux: '🐧', windows: '🪟', android: '📱' }[n.os] || '💻';
            const hw = n.hardware || {};
            const label = n.self ? 'K11' : n.name;

            let hwHtml = '';
            if (hw.cpu) hwHtml += `<div style="font-size:10px;color:#9ca3af;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${hw.cpu}">${hw.cpu}</div>`;
            if (hw.cores) {
                const ram = hw.ram || (hw.ram_total_mb ? (hw.ram_total_mb/1024).toFixed(1)+'GB' : '');
                hwHtml += `<div style="font-size:10px;color:#6b7280">${hw.cores} cores · ${ram}${hw.disk ? ' · '+hw.disk : ''}</div>`;
            }
            if (hw.gpu) {
                const util  = hw.gpu_util_pct  !== undefined ? ` ${hw.gpu_util_pct}%`   : '';
                const temp  = hw.gpu_temp_c    !== undefined ? ` ${hw.gpu_temp_c}°C`    : '';
                const vram  = hw.gpu_vram_used_mb !== undefined ? ` ${hw.gpu_vram_used_mb}/${hw.gpu_vram_total_mb}MB` : '';
                const power = hw.power_mw      !== undefined ? ` · ${(hw.power_mw/1000).toFixed(1)}W` : '';
                hwHtml += `<div style="font-size:10px;color:#818cf8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">GPU${util}${temp}${vram}${power}</div>`;
            }

            const latency = n.self ? 'self' : (n.reachable ? n.latency_ms + ' ms' : 'unreachable');

            return `
                <div class="${extraClass}" style="border:1px solid ${borderColor};background:#1f2937;border-radius:10px;padding:14px;width:200px;height:200px;box-sizing:border-box;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-start">
                    <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px">
                        <span style="background:${dotColor};width:8px;height:8px;border-radius:50%;flex-shrink:0"></span>
                        <span style="font-weight:600;font-size:13px;color:#f3f4f6;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${label}</span>
                    </div>
                    <div style="font-size:10px;color:#6b7280">${osIcon} ${n.ip}</div>
                    ${hwHtml}
                    <div style="font-size:10px;color:${labelColor};margin-top:4px">${latency}</div>
                </div>`;
        }

        async function fetchHiveNodes() {
            const el = document.getElementById('hive-topology');
            try {
                const res = await fetch('/hive/nodes');
                const { nodes } = await res.json();
                if (!nodes.length) {
                    el.innerHTML = '<p class="text-gray-500 text-sm text-center">No nodes found.</p>';
                    return;
                }

                const k11      = nodes.find(n => n.self);
                const saulynode = nodes.find(n => n.name === 'saulynode');
                const don1     = nodes.find(n => n.name === 'don1');
                const don2     = nodes.find(n => n.name === 'don2');
                const desktop  = nodes.find(n => n.name === 'DESKTOP-BVKF4TE' && n.os === 'linux');
                const rest     = nodes.filter(n =>
                    !n.self &&
                    n.name !== 'saulynode' &&
                    n.name !== 'don1' &&
                    n.name !== 'don2' &&
                    !(n.name === 'DESKTOP-BVKF4TE' && n.os === 'linux')
                );

                const CARD_W = '200px';
                const CARD_H = '200px';

                // Row 1: K11 centered
                let html = `<div style="display:flex;justify-content:center">
                    <div style="width:${CARD_W}">${k11 ? nodeCard(k11) : ''}</div>
                </div>`;

                // Connector K11 → middle row
                html += `<div class="vline"></div>`;

                // Horizontal bar connecting don1–saulynode–don2
                html += `<div style="display:flex;align-items:flex-start;justify-content:center;gap:0">
                    <!-- don1 col -->
                    <div class="node-col" style="width:${CARD_W}">
                        <div style="height:20px;display:flex;align-items:flex-end;width:100%;justify-content:flex-end">
                            <div style="height:2px;background:#374151;width:50%"></div>
                        </div>
                        ${don1 ? nodeCard(don1) : ''}
                    </div>
                    <!-- center connector + saulynode -->
                    <div class="node-col" style="width:${CARD_W}">
                        <div style="height:20px;display:flex;align-items:flex-end;width:100%;justify-content:center">
                            <div style="height:2px;background:#374151;width:100%"></div>
                        </div>
                        ${saulynode ? nodeCard(saulynode) : ''}
                    </div>
                    <!-- don2 col -->
                    <div class="node-col" style="width:${CARD_W}">
                        <div style="height:20px;display:flex;align-items:flex-end;width:100%;justify-content:flex-start">
                            <div style="height:2px;background:#374151;width:50%"></div>
                        </div>
                        ${don2 ? nodeCard(don2) : ''}
                    </div>
                </div>`;

                // Connector saulynode → desktop
                if (desktop) {
                    html += `<div style="display:flex;justify-content:center">
                        <div style="width:${CARD_W};display:flex;justify-content:center">
                            <div class="vline"></div>
                        </div>
                    </div>`;
                    html += `<div style="display:flex;justify-content:center">
                        <div style="width:${CARD_W}">${nodeCard(desktop)}</div>
                    </div>`;
                }

                // Rest row
                if (rest.length) {
                    html += `<div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:24px;padding-top:24px;border-top:1px solid #374151">
                        ${rest.map(n => `<div style="width:${CARD_W}">${nodeCard(n)}</div>`).join('')}
                    </div>`;
                }

                el.innerHTML = html;
            } catch(e) {
                el.innerHTML = '<p class="text-red-400 text-sm text-center">Failed to load nodes.</p>';
            }
        }

        async function fetchContainers() {
            const el = document.getElementById('docker-list');
            try {
                const res = await fetch('/system/docker/containers');
                const data = await res.json();
                if (!data.containers.length) {
                    el.innerHTML = '<p class="text-gray-500 text-sm">No running containers.</p>';
                    return;
                }
                el.innerHTML = data.containers.map(c => `
                    <div class="bg-gray-800 border border-gray-700 rounded-lg p-4">
                        <div class="flex justify-between items-center">
                            <span class="font-medium text-gray-100">${c.name}</span>
                            <span class="text-xs px-2 py-0.5 rounded bg-green-900 text-green-300">${c.status}</span>
                        </div>
                        <div class="text-xs text-gray-400 mt-1">${c.image}</div>
                        <div class="text-xs text-gray-600 mt-0.5">${c.id}</div>
                    </div>
                `).join('');
            } catch {
                el.innerHTML = '<p class="text-red-400 text-sm">Failed to load containers.</p>';
            }
        }

        async function fetchGpu() {
            const el = document.getElementById('gpu-info');
            try {
                const res = await fetch('/system/hardware/gpu');
                const { metrics } = await res.json();
                if (metrics.error) {
                    el.innerHTML = `<span class="text-gray-500">${metrics.error}</span>`;
                } else {
                    el.innerHTML = `
                        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px">
                            <div><p style="font-size:11px;color:#6b7280;margin-bottom:4px">Model</p><p class="text-gray-200">${metrics.gpu_model}</p></div>
                            <div><p style="font-size:11px;color:#6b7280;margin-bottom:4px">Utilization</p><p class="text-gray-200">${metrics.gpu_utilization_percent}%</p></div>
                            <div><p style="font-size:11px;color:#6b7280;margin-bottom:4px">VRAM</p><p class="text-gray-200">${metrics.memory_used_mb} / ${metrics.memory_total_mb} MB</p></div>
                        </div>`;
                }
            } catch {
                el.innerHTML = '<span class="text-red-400">Failed to load GPU info.</span>';
            }
        }

        fetchAll();
        setInterval(fetchAll, 30000);
    </script>

</body>
</html>
