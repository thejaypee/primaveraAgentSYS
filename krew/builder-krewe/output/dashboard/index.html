<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krewe Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 font-sans antialiased">

    <header class="bg-gray-900 border-b border-gray-800 sticky top-0 z-10">
        <div class="max-w-6xl mx-auto py-4 px-6 flex justify-between items-center">
            <h1 class="text-xl font-bold text-white tracking-tight">Krewe Dashboard</h1>
            <div class="flex items-center gap-4">
                <span id="last-updated" class="text-sm text-gray-400"></span>
                <button onclick="fetchAll()" class="px-4 py-1.5 text-sm bg-indigo-600 hover:bg-indigo-500 text-white rounded transition">
                    Refresh
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-6 space-y-8">

        <!-- Hive Nodes -->
        <section class="bg-gray-900 border border-gray-800 rounded-xl p-6">
            <h2 class="text-lg font-semibold text-gray-200 mb-4">Hive Nodes</h2>
            <div id="hive-list" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">
                <p class="text-gray-500 text-sm col-span-full">Loading...</p>
            </div>
        </section>

        <!-- Docker Containers -->
        <section class="bg-gray-900 border border-gray-800 rounded-xl p-6">
            <h2 class="text-lg font-semibold text-gray-200 mb-4">Containers</h2>
            <div id="docker-list" class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <p class="text-gray-500 text-sm">Loading...</p>
            </div>
        </section>

        <!-- GPU -->
        <section class="bg-gray-900 border border-gray-800 rounded-xl p-6">
            <h2 class="text-lg font-semibold text-gray-200 mb-4">GPU</h2>
            <div id="gpu-info" class="text-sm text-gray-400">Loading...</div>
        </section>

    </main>

    <script>
        async function fetchAll() {
            await Promise.all([fetchHiveNodes(), fetchContainers(), fetchGpu()]);
            document.getElementById('last-updated').innerText = new Date().toLocaleTimeString();
        }

        async function fetchHiveNodes() {
            const el = document.getElementById('hive-list');
            try {
                const res = await fetch('/hive/nodes');
                const { nodes } = await res.json();
                if (!nodes.length) {
                    el.innerHTML = '<p class="text-gray-500 text-sm col-span-full">No nodes found.</p>';
                    return;
                }
                el.innerHTML = nodes.map(n => {
                    const dotColor = n.reachable ? '#4ade80' : '#4b5563';
                    const labelColor = n.reachable ? '#4ade80' : '#4b5563';
                    const borderColor = n.self ? '#4f46e5' : '#374151';
                    const osIcon = { linux: '🐧', windows: '🪟', android: '📱', iOS: '📱' }[n.os] || '💻';
                    const hw = n.hardware || {};
                    const hwLines = [];
                    if (hw.cpu) hwLines.push(`<div class="text-xs text-gray-300 mt-1 truncate" title="${hw.cpu}">${hw.cpu}</div>`);
                    if (hw.cores) {
                        const ramStr = hw.ram || (hw.ram_total_mb ? (hw.ram_total_mb/1024).toFixed(1)+'GB' : '');
                        hwLines.push(`<div class="text-xs text-gray-500">${hw.cores} cores · ${ramStr} · ${hw.disk}</div>`);
                    }
                    if (hw.gpu) {
                        const gpuUtil = hw.gpu_util_pct !== undefined ? ` ${hw.gpu_util_pct}%` : '';
                        const gpuTemp = hw.gpu_temp_c !== undefined ? ` ${hw.gpu_temp_c}°C` : '';
                        const gpuVram = hw.gpu_vram_used_mb !== undefined ? ` ${hw.gpu_vram_used_mb}/${hw.gpu_vram_total_mb}MB` : '';
                        const power = hw.power_mw !== undefined ? ` · ${(hw.power_mw/1000).toFixed(1)}W` : '';
                        hwLines.push(`<div class="text-xs text-indigo-400 truncate" title="${hw.gpu}">GPU${gpuUtil}${gpuTemp}${gpuVram}${power}</div>`);
                    }
                    return `
                        <div style="border-color:${borderColor}" class="bg-gray-800 border rounded-lg p-3">
                            <div class="flex items-center gap-2 mb-1">
                                <span style="background:${dotColor};width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block"></span>
                                <span class="font-medium text-gray-100 text-sm truncate">${n.name}${n.self ? ' ✦' : ''}</span>
                            </div>
                            <div class="text-xs text-gray-400">${osIcon} ${n.os} · ${n.ip}</div>
                            ${hwLines.join('')}
                            <div style="color:${labelColor}" class="text-xs mt-1">${n.reachable ? (n.self ? 'self' : n.latency_ms + ' ms') : 'unreachable'}</div>
                        </div>
                    `;
                }).join('');
            } catch {
                el.innerHTML = '<p class="text-red-400 text-sm col-span-full">Failed to load nodes.</p>';
            }
        }

        async function fetchContainers() {
            const el = document.getElementById('docker-list');
            try {
                const res = await fetch('/system/docker/containers');
                const data = await res.json();
                if (!data.containers.length) {
                    el.innerHTML = '<p class="text-gray-500 text-sm">No running containers.</p>';
                    return;
                }
                el.innerHTML = data.containers.map(c => `
                    <div class="bg-gray-800 border border-gray-700 rounded-lg p-4">
                        <div class="flex justify-between items-center">
                            <span class="font-medium text-gray-100">${c.name}</span>
                            <span class="text-xs px-2 py-0.5 rounded bg-green-900 text-green-300">${c.status}</span>
                        </div>
                        <div class="text-xs text-gray-400 mt-1">${c.image}</div>
                        <div class="text-xs text-gray-600 mt-0.5">${c.id}</div>
                    </div>
                `).join('');
            } catch {
                el.innerHTML = '<p class="text-red-400 text-sm">Failed to load containers.</p>';
            }
        }

        async function fetchGpu() {
            const el = document.getElementById('gpu-info');
            try {
                const res = await fetch('/system/hardware/gpu');
                const { metrics } = await res.json();
                if (metrics.error) {
                    el.innerHTML = `<span class="text-gray-500">${metrics.error}</span>`;
                } else {
                    el.innerHTML = `
                        <div class="grid grid-cols-3 gap-4">
                            <div><p class="text-gray-500 text-xs mb-1">Model</p><p class="text-gray-200">${metrics.gpu_model}</p></div>
                            <div><p class="text-gray-500 text-xs mb-1">Utilization</p><p class="text-gray-200">${metrics.gpu_utilization_percent}%</p></div>
                            <div><p class="text-gray-500 text-xs mb-1">Memory</p><p class="text-gray-200">${metrics.memory_used_mb} / ${metrics.memory_total_mb} MB</p></div>
                        </div>
                    `;
                }
            } catch {
                el.innerHTML = '<span class="text-red-400">Failed to load GPU info.</span>';
            }
        }

        fetchAll();
        setInterval(fetchAll, 30000);
    </script>

</body>
</html>
