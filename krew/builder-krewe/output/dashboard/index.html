<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krewe Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .vline { width:2px; height:20px; background:#374151; margin:0 auto; }
        .hline-wrap { display:flex; align-items:center; justify-content:center; gap:0; }
        .hline { height:2px; background:#374151; flex:1; }
        .node-col { display:flex; flex-direction:column; align-items:center; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 font-sans antialiased">

    <header class="bg-gray-900 border-b border-gray-800 sticky top-0 z-10">
        <div class="max-w-5xl mx-auto py-4 px-6 flex justify-between items-center">
            <h1 class="text-xl font-bold text-white tracking-tight">Krewe Dashboard</h1>
            <div class="flex items-center gap-4">
                <span id="last-updated" class="text-sm text-gray-400"></span>
                <button onclick="fetchAll()" class="px-4 py-1.5 text-sm bg-indigo-600 hover:bg-indigo-500 text-white rounded transition">
                    Refresh
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto p-6 space-y-8">

        <!-- Hive Topology -->
        <section class="bg-gray-900 border border-gray-800 rounded-xl p-6">
            <h2 class="text-lg font-semibold text-gray-200 mb-6">Hive Nodes</h2>
            <div id="hive-topology">
                <p class="text-gray-500 text-sm text-center">Loading...</p>
            </div>
        </section>



    </main>

    <script>
        async function fetchAll() {
            await fetchHiveNodes();
            document.getElementById('last-updated').innerText = new Date().toLocaleTimeString();
        }

        function nodeCard(n) {
            const dotColor    = n.reachable ? '#4ade80' : '#4b5563';
            const labelColor  = n.reachable ? '#4ade80' : '#4b5563';
            const borderColor = n.self ? '#4f46e5' : '#374151';
            const osIcon = { linux: '🐧', windows: '🪟', android: '📱' }[n.os] || '💻';
            const hw = n.hardware || {};
            const label = n.self ? 'K11' : n.name;

            let hwHtml = '';
            if (hw.cpu) hwHtml += `<div style="font-size:10px;color:#9ca3af;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${hw.cpu}">${hw.cpu}</div>`;
            if (hw.cores) {
                const ram = hw.ram || (hw.ram_total_mb ? (hw.ram_total_mb/1024).toFixed(1)+'GB' : '');
                hwHtml += `<div style="font-size:10px;color:#6b7280">${hw.cores} cores · ${ram}${hw.disk ? ' · '+hw.disk : ''}</div>`;
            }
            if (hw.gpu) {
                const util  = hw.gpu_util_pct  !== undefined ? ` ${hw.gpu_util_pct}%`  : '';
                const temp  = hw.gpu_temp_c    !== undefined ? ` ${hw.gpu_temp_c}°C`   : '';
                const vram  = hw.gpu_vram_used_mb !== undefined ? ` ${hw.gpu_vram_used_mb}/${hw.gpu_vram_total_mb}MB` : '';
                const power = hw.power_mw      !== undefined ? ` · ${(hw.power_mw/1000).toFixed(1)}W` : '';
                hwHtml += `<div style="font-size:10px;color:#818cf8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">GPU${util}${temp}${vram}${power}</div>`;
            }

            const latency = n.self ? 'self' : (n.reachable ? n.latency_ms + ' ms' : 'unreachable');

            const containers = hw.containers || [];
            let ctrsHtml = '';
            if (containers.length) {
                ctrsHtml = containers.map(c =>
                    `<div style="font-size:9px;color:#6ee7b7;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">▶ ${c.name}</div>`
                ).join('');
            }

            const nodeId = n.self ? 'node-k11'
                : n.name === 'don1' ? 'node-don1'
                : n.name === 'don2' ? 'node-don2'
                : n.name === 'saulynode' ? 'node-saulynode'
                : (n.name === 'DESKTOP-BVKF4TE') ? 'node-desktop'
                : /suiplay/i.test(n.name) ? 'node-suiplay'
                : /pixel.?7/i.test(n.name) ? 'node-pixel7'
                : /pixel.?10/i.test(n.name) ? 'node-pixel10' : '';

            // Card: % width, aspect-ratio keeps it square
            return `<div id="${nodeId}" style="border:1px solid ${borderColor};background:#1f2937;border-radius:10px;padding:1.2%;
                        width:22%;min-width:120px;max-width:200px;aspect-ratio:1/1;
                        box-sizing:border-box;overflow:hidden;display:flex;flex-direction:column;
                        justify-content:flex-start;flex-shrink:0;position:relative;z-index:1">
                <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px">
                    <span style="background:${dotColor};width:8px;height:8px;border-radius:50%;flex-shrink:0"></span>
                    <span style="font-weight:600;font-size:13px;color:#f3f4f6;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${label}</span>
                </div>
                <div style="font-size:10px;color:#6b7280">${osIcon} ${n.ip}</div>
                ${hwHtml}
                ${ctrsHtml}
                <div style="font-size:10px;color:${labelColor};margin-top:auto;padding-top:4px">${latency}</div>
            </div>`;
        }

        async function fetchHiveNodes() {
            const el = document.getElementById('hive-topology');
            try {
                const res = await fetch('/hive/nodes');
                const { nodes } = await res.json();
                if (!nodes.length) {
                    el.innerHTML = '<p class="text-gray-500 text-sm text-center">No nodes found.</p>';
                    return;
                }

                const k11       = nodes.find(n => n.self);
                const saulynode = nodes.find(n => n.name === 'saulynode');
                const don1      = nodes.find(n => n.name === 'don1');
                const don2      = nodes.find(n => n.name === 'don2');
                const desktop   = nodes.find(n => n.name === 'DESKTOP-BVKF4TE' && n.os === 'linux');
                const suiplay   = nodes.find(n => /suiplay/i.test(n.name));
                const pixel7    = nodes.find(n => /pixel.?7/i.test(n.name));
                const pixel10   = nodes.find(n => /pixel.?10/i.test(n.name));
                const rest      = nodes.filter(n =>
                    !n.self &&
                    n.name !== 'saulynode' &&
                    n.name !== 'don1' &&
                    n.name !== 'don2' &&
                    !(n.name === 'DESKTOP-BVKF4TE' && n.os === 'linux') &&
                    !/suiplay/i.test(n.name) &&
                    !/pixel.?7/i.test(n.name) &&
                    !/pixel.?10/i.test(n.name)
                );

                // LAYOUT RULE: every connector (horizontal and vertical) must use GAP.
                // Adding a new row or node? Use hl(node)/vl(node) — never a custom size.
                // Change GAP once and the entire topology rebalances automatically.
                // Rod color = green if the node it leads to is reachable, gray if not.
                const GAP   = 'min(4vw,48px)';
                // Green = SSH live; red = SSH configured but down; gray = no SSH / unreachable
                const rc    = n => {
                    if (!n) return '#374151';
                    if (n.ssh_ok === true)  return '#4ade80';
                    if (n.ssh_ok === false) return '#ef4444';
                    return n.reachable ? '#4ade80' : '#374151';
                };
                const hl    = n => `height:2px;background:${rc(n)};width:${GAP};flex-shrink:0`;
                const vl    = n => `width:2px;background:${rc(n)};height:${GAP}`;
                const row   = `display:flex;align-items:center;justify-content:center;width:100%`;
                const vwrap = `display:flex;justify-content:center;width:100%`;
                const ph    = `width:22%;min-width:120px;max-width:200px;aspect-ratio:1/1;flex-shrink:0`;

                // Row 1: K11 centered
                let html = `<div style="${vwrap}">${k11 ? nodeCard(k11) : ''}</div>`;

                // Vertical connector K11 → saulynode
                html += `<div style="${vwrap}"><div style="${vl(saulynode)}"></div></div>`;

                // Row 2: don1 ── saulynode ── don2
                html += `<div style="${row}">
                    ${don1 ? nodeCard(don1) : `<div style="${ph}"></div>`}
                    <div style="${hl(don1)}"></div>
                    ${saulynode ? nodeCard(saulynode) : `<div style="${ph}"></div>`}
                    <div style="${hl(don2)}"></div>
                    ${don2 ? nodeCard(don2) : `<div style="${ph}"></div>`}
                </div>`;

                // Vertical connector saulynode → desktop row
                html += `<div style="${vwrap}"><div style="${vl(desktop)}"></div></div>`;

                // Row 3: Pixel7 ── Desktop ── Pixel10
                html += `<div style="${row}">
                    ${pixel7  ? nodeCard(pixel7)  : `<div style="${ph}"></div>`}
                    <div style="${hl(pixel7)}"></div>
                    ${desktop ? nodeCard(desktop) : `<div style="${ph}"></div>`}
                    <div style="${hl(pixel10)}"></div>
                    ${pixel10 ? nodeCard(pixel10) : `<div style="${ph}"></div>`}
                </div>`;

                // Vertical connector Desktop → suiplay (caboose)
                if (suiplay) {
                    html += `<div style="${vwrap}"><div style="${vl(suiplay)}"></div></div>`;
                    html += `<div style="${vwrap}">${nodeCard(suiplay)}</div>`;
                }

                // Any remaining unlisted nodes
                if (rest.length) {
                    html += `<div style="display:flex;flex-wrap:wrap;gap:2%;margin-top:4%;justify-content:center">
                        ${rest.map(n => nodeCard(n)).join('')}
                    </div>`;
                }

                el.style.position = 'relative';
                el.innerHTML = html;

                // Draw all connections with directional ping animations
                requestAnimationFrame(() => drawConnections(el, [
                    // Structural rods (pulse only, line drawn by HTML)
                    { from: 'node-k11',      to: 'node-saulynode', fc: 'bc', tc: 'tc', color: rc(saulynode), structural: true },
                    { from: 'node-saulynode',to: 'node-don1',       fc: 'lc', tc: 'rc', color: rc(don1),     structural: true },
                    { from: 'node-saulynode',to: 'node-don2',       fc: 'rc', tc: 'lc', color: rc(don2),     structural: true },
                    { from: 'node-saulynode',to: 'node-desktop',    fc: 'bc', tc: 'tc', color: rc(desktop),  structural: true },
                    { from: 'node-desktop',  to: 'node-pixel7',     fc: 'lc', tc: 'rc', color: rc(pixel7),   structural: true },
                    { from: 'node-desktop',  to: 'node-pixel10',    fc: 'rc', tc: 'lc', color: rc(pixel10),  structural: true },
                    { from: 'node-desktop',  to: 'node-suiplay',    fc: 'bc', tc: 'tc', color: rc(suiplay),  structural: true },
                    // Diagonal connections
                    { from: 'node-k11',      to: 'node-don1',    fc: 'bl', tc: 'tr', color: rc(don1)    },
                    { from: 'node-k11',      to: 'node-don2',    fc: 'br', tc: 'tl', color: rc(don2)    },
                    { from: 'node-don1',     to: 'node-desktop', fc: 'br', tc: 'tl', color: rc(desktop)  },
                    { from: 'node-don2',     to: 'node-desktop', fc: 'bl', tc: 'tr', color: rc(desktop)  },
                    { from: 'node-don1',     to: 'node-pixel7',  fc: 'bl', tc: 'tl', color: rc(pixel7)   },
                    { from: 'node-don2',     to: 'node-pixel10', fc: 'br', tc: 'tr', color: rc(pixel10)  },
                    { from: 'node-saulynode',to: 'node-pixel7',  fc: 'bl', tc: 'tr', color: rc(pixel7)   },
                    { from: 'node-saulynode',to: 'node-pixel10', fc: 'br', tc: 'tl', color: rc(pixel10)  },
                    { from: 'node-suiplay',  to: 'node-pixel7',  fc: 'tl', tc: 'br', color: rc(pixel7)   },
                    { from: 'node-suiplay',  to: 'node-pixel10', fc: 'tr', tc: 'bl', color: rc(pixel10)  },
                ]));
            } catch(e) {
                el.innerHTML = '<p class="text-red-400 text-sm text-center">Failed to load nodes.</p>';
            }
        }

        function drawConnections(container, connections) {
            const old = container.querySelector('.diag-svg');
            if (old) old.remove();

            const NS  = 'http://www.w3.org/2000/svg';
            const XNS = 'http://www.w3.org/1999/xlink';
            const svg = document.createElementNS(NS, 'svg');
            svg.classList.add('diag-svg');
            svg.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible;z-index:2';

            const cr = container.getBoundingClientRect();
            const pt = (r, c) => {
                const mx = (r.left + r.right)  / 2 - cr.left;
                const my = (r.top  + r.bottom) / 2 - cr.top;
                return { tl:{x:r.left-cr.left,y:r.top-cr.top},    tr:{x:r.right-cr.left,y:r.top-cr.top},
                         bl:{x:r.left-cr.left,y:r.bottom-cr.top}, br:{x:r.right-cr.left,y:r.bottom-cr.top},
                         tc:{x:mx,y:r.top-cr.top},   bc:{x:mx,y:r.bottom-cr.top},
                         lc:{x:r.left-cr.left,y:my}, rc:{x:r.right-cr.left,y:my} }[c];
            };

            const CYCLE    = 8;    // total seconds for 4 ping+reply cycles
            const TRAVEL   = 0.55; // seconds to cross the line
            const GAP      = 0.12; // pause between ping arriving and reply departing
            const INTERVAL = CYCLE / 4;

            const addPulse = (pathId, beginSec, fill, fwd, lost) => {
                const dot = document.createElementNS(NS, 'circle');
                dot.setAttribute('r', '3.5');
                dot.setAttribute('fill', fill);
                dot.setAttribute('opacity', '0');

                const motion = document.createElementNS(NS, 'animateMotion');
                motion.setAttribute('dur',         `${CYCLE}s`);
                motion.setAttribute('begin',       `${beginSec.toFixed(3)}s`);
                motion.setAttribute('repeatCount', 'indefinite');
                motion.setAttribute('calcMode',    'linear');
                motion.setAttribute('keyTimes',    `0;0.001;${(TRAVEL/CYCLE).toFixed(4)};1`);
                motion.setAttribute('keyPoints',   fwd ? '0;0;1;1' : '1;1;0;0');
                const mp = document.createElementNS(NS, 'mpath');
                mp.setAttributeNS(XNS, 'href', `#${pathId}`);
                motion.appendChild(mp);

                const fade = document.createElementNS(NS, 'animate');
                fade.setAttribute('attributeName', 'opacity');
                if (lost) {
                    // Turn red and vanish halfway — no reply
                    fade.setAttribute('values',   '0;1;1;0;0');
                    fade.setAttribute('keyTimes', `0;0.01;${(TRAVEL*0.45/CYCLE).toFixed(4)};${(TRAVEL*0.52/CYCLE).toFixed(4)};1`);
                    const toRed = document.createElementNS(NS, 'animate');
                    toRed.setAttribute('attributeName', 'fill');
                    toRed.setAttribute('values',   `${fill};#ef4444`);
                    toRed.setAttribute('keyTimes', `0;${(TRAVEL*0.35/CYCLE).toFixed(4)}`);
                    toRed.setAttribute('dur', `${CYCLE}s`); toRed.setAttribute('begin', `${beginSec.toFixed(3)}s`);
                    toRed.setAttribute('repeatCount', 'indefinite');
                    dot.appendChild(toRed);
                } else {
                    fade.setAttribute('values',   '0;1;0.9;0;0');
                    fade.setAttribute('keyTimes', `0;0.01;${(TRAVEL*0.82/CYCLE).toFixed(4)};${(TRAVEL/CYCLE).toFixed(4)};1`);
                }
                fade.setAttribute('dur',         `${CYCLE}s`);
                fade.setAttribute('begin',       `${beginSec.toFixed(3)}s`);
                fade.setAttribute('repeatCount', 'indefinite');
                dot.appendChild(motion);
                dot.appendChild(fade);
                svg.appendChild(dot);
            };

            connections.forEach(({ from, to, fc, tc, color, structural }, i) => {
                const a = document.getElementById(from);
                const b = document.getElementById(to);
                if (!a || !b) return;
                const p1 = pt(a.getBoundingClientRect(), fc);
                const p2 = pt(b.getBoundingClientRect(), tc);

                const pathId = `cp-${i}`;
                const path = document.createElementNS(NS, 'path');
                path.id = pathId;
                path.setAttribute('d', `M ${p1.x} ${p1.y} L ${p2.x} ${p2.y}`);
                path.setAttribute('fill', 'none');
                path.setAttribute('stroke', structural ? 'none' : color);
                path.setAttribute('stroke-width', structural ? '0' : '2');
                svg.appendChild(path);

                const live = color !== '#374151';
                for (let j = 0; j < 4; j++) {
                    const t0 = j * INTERVAL;
                    if (live) {
                        addPulse(pathId, t0,              '#3b82f6', true,  false); // outgoing
                        addPulse(pathId, t0+TRAVEL+GAP,   '#93c5fd', false, false); // reply
                    } else {
                        addPulse(pathId, t0, '#3b82f6', true, true); // lost — goes red, dies mid-path
                    }
                }
            });

            container.appendChild(svg);
        }

        fetchAll();
        setInterval(fetchAll, 30000);
    </script>

</body>
</html>
